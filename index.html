/* Zona elegida para ver la hora local: lo guardado, o la del navegador si

/* idioma inicial: lo guardado, o el del navegador, o español */
let LANG = localStorage.getItem("lang")
  || (navigator.language && navigator.language.toLowerCase().startsWith("en") ? "en" : "es");
let DIA_SEL = 0;            // índice de día seleccionado (0 = lunes)
let INSCRIPCIONES = [];     // [{fecha, franja, nombre}]

const t = () => I18N[LANG];

/* ---- fecha de hoy en zona horaria de Mendoza ---- */
function hoyEnTZ(){
  const f = new Intl.DateTimeFormat("en-CA",{timeZone:TZ_REF,year:"numeric",month:"2-digit",day:"2-digit"});
  const [y,m,d] = f.format(new Date()).split("-").map(Number);
  return new Date(Date.UTC(y,m-1,d,12,0,0)); // mediodía UTC para evitar desfases
}
function lunesDeLaSemana(){
  const x = hoyEnTZ();
  const dow = (x.getUTCDay()+6)%7; // 0 = lunes
  x.setUTCDate(x.getUTCDate()-dow);
  return x;
}
function claveFecha(d){ return d.toISOString().slice(0,10); }

function diasDeLaSemana(){
  const base = lunesDeLaSemana();
  return Array.from({length:7},(_,i)=>{
    const d = new Date(base); d.setUTCDate(base.getUTCDate()+i);
    return { key:claveFecha(d), num:d.getUTCDate(), mes:parseInt(d.toISOString().slice(5,7))-1 };
  });
}

/* ---- las 36 franjas de un día: "00:00","00:40",... "23:20" ---- */
function franjasDelDia(){
  return Array.from({length:36},(_,i)=>{
    const mins=i*40;
    return `${String(Math.floor(mins/60)).padStart(2,"0")}:${String(mins%60).padStart(2,"0")}`;
  });
}
function finFranja(inicio){
  const [h,m]=inicio.split(":").map(Number);
  let mt=(h*60+m+40)%1440;
  return `${String(Math.floor(mt/60)).padStart(2,"0")}:${String(mt%60).padStart(2,"0")}`;
}

/* franja en curso AHORA en hora de Mendoza → "HH:mm" (inicio del turno) */
function franjaActualMza(){
  const p = new Intl.DateTimeFormat("en-GB",{timeZone:TZ_REF,hourCycle:"h23",hour:"2-digit",minute:"2-digit"}).formatToParts(new Date());
  const h = +((p.find(x=>x.type==="hour")||{}).value||0);
  const m = +((p.find(x=>x.type==="minute")||{}).value||0);
  const mins = Math.floor((h*60+m)/40)*40;
  return `${String(Math.floor(mins/60)).padStart(2,"0")}:${String(mins%60).padStart(2,"0")}`;
}

/* ---- conversión de un turno a la hora local de TZ_USER ----
   Parte del instante absoluto (fecha+franja en Mendoza, offset fijo -03:00)
   y lo formatea en la zona elegida. Devuelve el rango "HH:mm–HH:mm" y, si en
   esa zona el turno cae en otro día, el nombre corto del día como prefijo. */
function partesEnTZ(inst, tz){
  const p = new Intl.DateTimeFormat("en-GB",{
    timeZone:tz, hourCycle:"h23",
    hour:"2-digit", minute:"2-digit",
    year:"numeric", month:"2-digit", day:"2-digit"
  }).formatToParts(inst);
  const g = type => (p.find(x=>x.type===type)||{}).value;
  return { hh:g("hour"), mm:g("minute"), key:`${g("year")}-${g("month")}-${g("day")}` };
}
function rangoLocal(fecha, franja, tz){
  const ini = new Date(`${fecha}T${franja}:00${TZ_REF_OFFSET}`);
  const fin = new Date(ini.getTime() + 40*60000);
  const s = partesEnTZ(ini, tz), e = partesEnTZ(fin, tz);
  let pref = "";
  if(s.key !== fecha){
    const wd = new Date(s.key+"T12:00:00Z").getUTCDay(); // 0=domingo
    pref = t().diasCorto[(wd+6)%7] + " ";
  }
  return `${pref}${s.hh}:${s.mm}–${e.hh}:${e.mm}`;
}

function rangoTexto(dias){
  const T=t(), a=dias[0], b=dias[6];
  const ma=T.meses[a.mes], mb=T.meses[b.mes];
  if(LANG==="en"){
    return ma===mb ? `${ma} ${a.num}–${b.num}` : `${ma} ${a.num} ${T.al} ${mb} ${b.num}`;
  }
  return ma===mb ? `${a.num} ${T.al} ${b.num} ${T.de} ${ma}` : `${a.num} ${T.de} ${ma} ${T.al} ${b.num} ${T.de} ${mb}`;
}

}

async function cargar(){
  if(!CONFIG.endpoint){
    const b=document.getElementById("banner");
    b.style.display="block"; b.textContent=t().demo;
    INSCRIPCIONES = demoData();
    render(); return;
  }
  try{
    const r = await fetch(CONFIG.endpoint,{method:"GET"});
    const j = await r.json();
    INSCRIPCIONES = (j.inscripciones||[]);
    render();
  }catch(e){
    document.getElementById("board").className="state";
    document.getElementById("board").textContent = t().errCargar;
  }
}

/* ---- pinta los textos fijos según idioma ---- */
function pintarChrome(){
  const T=t();
  document.documentElement.lang = T.htmlLang;
  document.getElementById("kicker").textContent = T.kicker;
  document.getElementById("title").textContent = T.title;
  document.getElementById("lede").textContent = T.lede;
  document.getElementById("callout").textContent = T.callout;
  document.getElementById("sectionTitle").textContent = T.sectionTitle;
  document.getElementById("note").textContent = T.nota;
  document.title = T.title;
  document.querySelectorAll("#lang button").forEach(b=>{
    b.classList.toggle("active", b.dataset.l===LANG);
  });
  pintarTZ();
  pintarFooter();
}

/* ---- selector de zona horaria: opciones agrupadas + textos i18n ---- */
function pintarTZ(){
  const T=t();
  document.getElementById("tzlabel").textContent = T.tzLabel;
  document.getElementById("tznote").textContent = T.tzNota;
  const sel = document.getElementById("tz");
  sel.innerHTML = "";
  ["latam","eu"].forEach(g=>{
    const og = document.createElement("optgroup");
    og.label = T.tzGrupos[g];
    TIMEZONES.filter(z=>z.g===g).forEach(z=>{
      const op = document.createElement("option");
      op.value = z.id;
      op.textContent = z[LANG];
      if(z.id===TZ_USER) op.selected = true;
      og.appendChild(op);
    });
    sel.appendChild(og);
  });
}

function render(){
  pintarChrome();
  const T=t();
  const dias = diasDeLaSemana();
  const clavesSemana = new Set(dias.map(d=>d.key));

  // contador global de cobertura (franjas con al menos 1 persona, en esta semana)
  const cubiertas = new Set(
    INSCRIPCIONES.filter(i=>clavesSemana.has(i.fecha)).map(i=>i.fecha+"|"+i.franja)
  );
  document.getElementById("week").textContent = `${T.semanaDel} ${rangoTexto(dias)}`;
  document.getElementById("cover").textContent = T.cobertura(cubiertas.size);

  // turno que se reza AHORA (hora de Mendoza)
  const hoyKey = claveFecha(hoyEnTZ());
  const franjaNow = franjaActualMza();

  // pestañas por día
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";
  dias.forEach((d,i)=>{
    const cubDia = new Set(
      INSCRIPCIONES.filter(x=>x.fecha===d.key).map(x=>x.franja)
    ).size;
    const btn = document.createElement("button");
    btn.className = "tab"+(i===DIA_SEL?" active":"");
    btn.setAttribute("role","tab");
    btn.setAttribute("aria-selected", i===DIA_SEL?"true":"false");
    btn.innerHTML = `<span class="tlabel">${T.diasCorto[i]}</span><span class="tnum">${d.num}</span><span class="tcov">${T.cobDia(cubDia)}</span>`;
    btn.addEventListener("click",()=>{ DIA_SEL=i; render(); });
    tabs.appendChild(btn);
  });

  // franjas del día seleccionado
  const dia = dias[DIA_SEL];
  const franjas = franjasDelDia();
  const cubreEnDia = new Set(INSCRIPCIONES.filter(i=>i.fecha===dia.key).map(i=>i.franja));

  // tira de cobertura: los 36 turnos del día de un vistazo
  const strip = document.getElementById("coverstrip");
  strip.innerHTML = "";
  franjas.forEach(f=>{
    const seg = document.createElement("i");
    if(dia.key===hoyKey && f===franjaNow) seg.className="now";
    else if(cubreEnDia.has(f)) seg.className="on";
    strip.appendChild(seg);
  });

  // tarjetas de turnos
  const board = document.getElementById("board");
  board.className = "cards";
  board.innerHTML = "";

  franjas.forEach(franja=>{
    const gente = INSCRIPCIONES.filter(i=>i.fecha===dia.key && i.franja===franja);
    const esAhora = (dia.key===hoyKey && franja===franjaNow);
    const slot = document.createElement("article");
    slot.className = "slot"+(gente.length?" has":"")+(esAhora?" now":"");

    const personas = gente.length
      ? `<div class="people">${gente.map(g=>escapeHtml(g.nombre)).join(" · ")}</div>`
      : `<div class="people"><span class="empty">${T.nadie}</span></div>`;

    const mostrarLocal = TZ_USER !== TZ_REF;
    const localLine = mostrarLocal
      ? `<div class="local"><span class="lt">${T.tuHora}</span><span class="lh">${rangoLocal(dia.key,franja,TZ_USER)}</span></div>`
      : "";

    slot.innerHTML = `
      ${esAhora?`<span class="nowbadge">${T.ahora}</span>`:""}
      <div class="time">${franja}–${finFranja(franja)}</div>
      ${mostrarLocal?`<div class="ref">${T.refCiudad}</div>`:""}
      ${localLine}
      ${gente.length?`<div class="count">${T.personas(gente.length)}</div>`:""}
      ${personas}
      <div class="actions">
        <button class="join">${T.sumarme}</button>
        ${gente.length?`<button class="leave">${T.borrarme}</button>`:""}
      </div>
      <form class="form alta" data-franja="${franja}">
        <div class="row"><label>${T.nombre}</label><input name="nombre" required maxlength="60" placeholder="${T.nombre}"></div>
        <div class="row"><label>${T.email}</label><input name="email" type="email" required placeholder="tu@correo.com"></div>
        <button type="submit">${T.confirmar}</button>
        <button type="button" class="cancel">${T.cancelar}</button>
      </form>
      ${gente.length?`<form class="form baja" data-franja="${franja}">
        <div class="row"><label>${T.email}</label><input name="email" type="email" required placeholder="tu@correo.com"></div>
        <button type="submit">${T.confirmarBaja}</button>
        <button type="button" class="cancel">${T.cancelar}</button>
      </form>`:""}`;

    const formAlta = slot.querySelector("form.alta");
    slot.querySelector(".join").addEventListener("click",()=>{
      const open = formAlta.classList.contains("open");
      document.querySelectorAll(".form.open").forEach(f=>f.classList.remove("open"));
      if(!open){ formAlta.classList.add("open"); formAlta.querySelector("input").focus(); }
    });
    formAlta.querySelector(".cancel").addEventListener("click",()=>formAlta.classList.remove("open"));
    formAlta.addEventListener("submit",ev=>enviar(ev,formAlta,dia.key));

    const formBaja = slot.querySelector("form.baja");
    if(formBaja){
      slot.querySelector(".leave").addEventListener("click",()=>{
        const open = formBaja.classList.contains("open");
        document.querySelectorAll(".form.open").forEach(f=>f.classList.remove("open"));
        if(!open){ formBaja.classList.add("open"); formBaja.querySelector("input").focus(); }
      });
      formBaja.querySelector(".cancel").addEventListener("click",()=>formBaja.classList.remove("open"));
      formBaja.addEventListener("submit",ev=>borrar(ev,formBaja,dia.key));
    }

    board.appendChild(slot);
  });
}

async function enviar(ev,form,fecha){
  ev.preventDefault();
  const btn = form.querySelector("button[type=submit]");
  const datos = {
    fecha,
    franja: form.dataset.franja,
    nombre: form.nombre.value.trim(),
    email: form.email.value.trim()
  };
  if(!datos.nombre || !datos.email) return;
  btn.disabled=true; btn.textContent=t().enviando;

  if(!CONFIG.endpoint){
    INSCRIPCIONES.push({fecha:datos.fecha,franja:datos.franja,nombre:datos.nombre});
    mostrarConfirm(datos.fecha, datos.franja);
    render(); return;
  }
  try{
    const params = new URLSearchParams();
    params.append("fecha", datos.fecha);
    params.append("franja", datos.franja);
    params.append("nombre", datos.nombre);
    params.append("email", datos.email);
    params.append("lang", LANG);
    await fetch(CONFIG.endpoint,{ method:"POST", body:params });
    INSCRIPCIONES.push({fecha:datos.fecha,franja:datos.franja,nombre:datos.nombre}); // optimista
    mostrarConfirm(datos.fecha, datos.franja);
    render();
  }catch(e){
    btn.disabled=false; btn.textContent=t().confirmar;
    alert(t().errEnviar);
  }
}

async function borrar(ev,form,fecha){
  ev.preventDefault();
  const btn = form.querySelector("button[type=submit]");
  const email = form.email.value.trim();
  if(!email) return;
  btn.disabled=true; btn.textContent=t().enviando;

  if(!CONFIG.endpoint){
    // demo: no hay emails en los datos de ejemplo, sólo cerramos el formulario
    form.classList.remove("open"); btn.disabled=false; btn.textContent=t().confirmarBaja; return;
  }
  try{
    const params = new URLSearchParams();
    params.append("accion","baja");
    params.append("fecha", fecha);
    params.append("franja", form.dataset.franja);
    params.append("email", email);
    const r = await fetch(CONFIG.endpoint,{ method:"POST", body:params });
    let j = null; try{ j = await r.json(); }catch(_){}
    if(j === null){ await cargar(); return; }          // no se pudo leer: refrescamos igual
    if(j.ok && j.borradas > 0){ await cargar(); return; } // baja efectiva: re-render desde el servidor
    btn.disabled=false; btn.textContent=t().confirmarBaja;
    alert(t().bajaSinMatch);
  }catch(e){
    btn.disabled=false; btn.textContent=t().confirmarBaja;
    alert(t().errBorrar);
  }
}

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

/* ====== Calendario del lado del cliente (.ics) ======
   Genera el .ics en el navegador, sin pasar por el mail: el recordatorio NO
   depende de la cuota de Gmail (~100/día). Evento puntual de 40 min anclado a
   la hora de Mendoza (offset fijo -03:00) + alarma 15 min antes. METHOD:PUBLISH
   para que el calendario lo agregue directo, sin RSVP. */
function construirICSCliente(fecha, franja){
  const T = t();
  const ini = new Date(`${fecha}T${franja}:00${TZ_REF_OFFSET}`);
  const fin = new Date(ini.getTime() + 40*60000);
  const pad = n => String(n).padStart(2,"0");
  const stamp = d => `${d.getUTCFullYear()}${pad(d.getUTCMonth()+1)}${pad(d.getUTCDate())}T${pad(d.getUTCHours())}${pad(d.getUTCMinutes())}${pad(d.getUTCSeconds())}Z`;
  const esc = s => String(s).replace(/([,;\\])/g,"\\$1").replace(/\n/g,"\\n");
  const uid = ((self.crypto && crypto.randomUUID) ? crypto.randomUUID()
              : Date.now()+"-"+Math.random().toString(16).slice(2)) + "@oracionporlapaz";
  return [
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Oracion por la Paz//ES","CALSCALE:GREGORIAN","METHOD:PUBLISH",
    "BEGIN:VEVENT",
    "UID:"+uid,
    "DTSTAMP:"+stamp(new Date()),
    "DTSTART:"+stamp(ini),
    "DTEND:"+stamp(fin),
    "SUMMARY:"+esc(T.evtTitulo),
    "DESCRIPTION:"+esc(T.evtDesc),
    "BEGIN:VALARM","TRIGGER:-PT15M","ACTION:DISPLAY","DESCRIPTION:"+esc(T.evtAlarma),"END:VALARM",
    "END:VEVENT","END:VCALENDAR"
  ].join("\r\n");
}
function descargarICS(fecha, franja){
  const blob = new Blob([construirICSCliente(fecha, franja)], {type:"text/calendar;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "turno-oracion.ics";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
/* Confirmación tras anotarse: mensaje + botón de calendario. Vive fuera del
   tablero, así sobrevive al render(). */
function mostrarConfirm(fecha, franja){
  const T = t();
  const c = document.getElementById("confirm");
  c.style.display = "flex";
  c.innerHTML = "";
  const msg = document.createElement("span");
  msg.className = "ctxt";
  msg.textContent = T.confirmTexto(fecha, franja);
  const add = document.createElement("button");
  add.className = "addcal";
  add.textContent = T.addCal;
  add.addEventListener("click", ()=>descargarICS(fecha, franja));
  const close = document.createElement("button");
  close.className = "cclose";
  close.textContent = T.cerrar;
  close.addEventListener("click", ()=>{ c.style.display="none"; });
  c.append(msg, add, close);
  c.scrollIntoView({behavior:"smooth", block:"nearest"});
}
