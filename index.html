<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oración por la Paz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Newsreader:opsz,wght@6..72,400;6..72,500&family=Archivo:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#faf8f3;
    --ink:#1c1b18;
    --grey:#6f6d66;
    --faint:#a6a39a;
    --line:#e2ded3;
    --accent:#2f3e63;
    --display:'Fraunces',Georgia,serif;
    --body:'Newsreader',Georgia,serif;
    --label:'Archivo',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--paper);color:var(--ink);
    font-family:var(--body);font-size:18px;line-height:1.6;
    -webkit-font-smoothing:antialiased;
    padding:clamp(1.5rem,5vw,4rem) clamp(1rem,5vw,2rem);
  }
  .wrap{max-width:980px;margin:0 auto}

  /* ---- encabezado + selector de idioma ---- */
  .top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem}
  .kicker{
    font-family:var(--label);font-size:12px;font-weight:500;
    letter-spacing:.22em;text-transform:uppercase;color:var(--accent);
    margin-bottom:.6rem;
  }
  .lang{display:flex;gap:.1rem;font-family:var(--label);font-size:12px;flex-shrink:0}
  .lang button{
    background:none;border:1px solid var(--line);color:var(--grey);
    font-family:var(--label);font-size:11px;font-weight:500;letter-spacing:.08em;
    padding:.3rem .55rem;cursor:pointer;
  }
  .lang button.active{background:var(--accent);color:var(--paper);border-color:var(--accent)}

  h1{
    font-family:var(--display);font-weight:400;
    font-size:clamp(2.6rem,7vw,4.4rem);line-height:1.02;
    letter-spacing:-.01em;margin-bottom:1.1rem;
  }
  .lede{font-size:1.05rem;color:var(--grey);max-width:48ch}
  .rule{height:1px;background:var(--line);margin:2rem 0}

  .banner{
    font-family:var(--label);font-size:12px;letter-spacing:.02em;
    background:#fff;border:1px dashed var(--accent);color:var(--accent);
    padding:.6rem .8rem;margin-bottom:1.6rem;
  }

  .confirm{
    display:flex;align-items:center;flex-wrap:wrap;gap:.7rem 1rem;
    background:#fff;border:1px solid var(--accent);
    padding:.8rem 1rem;margin-bottom:1.6rem;
  }
  .confirm .ctxt{font-size:.95rem;color:var(--ink);flex:1 1 16rem}
  .confirm .addcal{
    font-family:var(--label);font-size:13px;font-weight:500;letter-spacing:.04em;
    background:var(--accent);color:var(--paper);border:none;
    padding:.5rem .9rem;cursor:pointer;flex-shrink:0;
  }
  .confirm .addcal:hover{opacity:.85}
  .confirm .cclose{
    font-family:var(--label);font-size:12px;color:var(--grey);
    background:none;border:none;cursor:pointer;text-decoration:underline;
  }

  .meta{
    display:flex;justify-content:space-between;align-items:baseline;
    flex-wrap:wrap;gap:.5rem 1rem;margin-bottom:1.4rem;
  }
  .meta .week{font-family:var(--display);font-size:1.5rem}
  .meta .cover{font-family:var(--label);font-size:13px;color:var(--grey);letter-spacing:.02em}

  /* ---- selector de zona horaria ---- */
  .tzrow{
    display:flex;align-items:center;flex-wrap:wrap;gap:.5rem .7rem;
    margin-bottom:1.4rem;
  }
  .tzrow label{
    font-family:var(--label);font-size:11px;font-weight:500;letter-spacing:.1em;
    text-transform:uppercase;color:var(--grey);
  }
  .tzrow select{
    font-family:var(--label);font-size:13px;color:var(--ink);
    background:#fff;border:1px solid var(--line);border-radius:0;
    padding:.4rem .6rem;cursor:pointer;
  }
  .tzrow select:focus{outline:none;border-color:var(--accent)}
  .tzrow .tznote{
    font-family:var(--label);font-size:11px;color:var(--faint);
    flex:1 1 14rem;line-height:1.5;
  }

  /* ---- pestañas por día ---- */
  .tabs{
    display:flex;flex-wrap:wrap;gap:1px;background:var(--line);
    border:1px solid var(--line);margin-bottom:1.4rem;
  }
  .tab{
    flex:1 1 auto;min-width:84px;background:var(--paper);
    font-family:var(--label);font-size:12px;font-weight:500;letter-spacing:.04em;
    color:var(--grey);border:none;cursor:pointer;
    padding:.7rem .4rem;display:flex;flex-direction:column;align-items:center;gap:.25rem;
  }
  .tab .tnum{font-family:var(--display);font-size:1.15rem;color:var(--ink);line-height:1}
  .tab .tcov{font-size:10px;letter-spacing:.06em;color:var(--faint)}
  .tab.active{background:var(--accent);color:var(--paper)}
  .tab.active .tnum,.tab.active .tcov{color:var(--paper)}

  /* ---- lista de franjas ---- */
  .slots{display:grid;gap:1px;background:var(--line);border:1px solid var(--line)}
  .slot{background:var(--paper);padding:.85rem 1rem}
  .slot .head{display:flex;align-items:baseline;gap:.7rem;flex-wrap:wrap}
  .slot .time{font-family:var(--display);font-size:1.1rem;color:var(--accent);white-space:nowrap}
  .slot .ref{font-family:var(--label);font-size:10px;letter-spacing:.06em;color:var(--faint);text-transform:uppercase}
  .slot .local{
    font-family:var(--label);font-size:12px;color:var(--grey);
    margin-top:.15rem;display:flex;align-items:baseline;gap:.45rem;
  }
  .slot .local .lt{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
  .slot .local .lh{font-family:var(--display);color:var(--ink)}
  .slot .count{
    font-family:var(--label);font-size:10px;font-weight:500;letter-spacing:.12em;
    text-transform:uppercase;color:var(--faint);
  }
  .slot.has .count{color:var(--accent)}
  .slot .people{font-size:.95rem;color:var(--ink);margin:.25rem 0 0}
  .slot .people .empty{color:var(--faint);font-style:italic}
  .slot .actions{display:flex;gap:1.3rem;align-items:baseline;margin-top:.5rem}
  .slot .join,.slot .leave{
    font-family:var(--label);font-size:12px;font-weight:500;
    background:none;border:none;cursor:pointer;padding:0;line-height:1.4;
  }
  .slot .join{color:var(--accent);border-bottom:1px solid var(--accent)}
  .slot .leave{color:var(--grey);border-bottom:1px solid var(--line)}
  .slot .join:hover,.slot .leave:hover{opacity:.6}

  .form{margin-top:.7rem;display:none;flex-direction:column;gap:.5rem;max-width:340px}
  .form.open{display:flex}
  .form label{font-family:var(--label);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--grey)}
  .form input{
    font-family:var(--body);font-size:.95rem;color:var(--ink);
    background:#fff;border:1px solid var(--line);border-radius:0;
    padding:.5rem .6rem;width:100%;
  }
  .form input:focus{outline:none;border-color:var(--accent)}
  .form .row{display:flex;flex-direction:column;gap:.2rem}
  .form button[type=submit]{
    font-family:var(--label);font-size:13px;font-weight:500;letter-spacing:.04em;
    background:var(--accent);color:var(--paper);border:none;
    padding:.55rem .9rem;cursor:pointer;align-self:flex-start;margin-top:.2rem;
  }
  .form button[type=submit]:disabled{opacity:.5;cursor:default}
  .form .cancel{font-family:var(--label);font-size:12px;color:var(--grey);background:none;border:none;cursor:pointer;text-decoration:underline;align-self:flex-start}

  .note{font-family:var(--label);font-size:12px;color:var(--grey);margin-top:2.2rem;line-height:1.7;max-width:60ch}
  .state{font-family:var(--label);font-size:13px;color:var(--grey);padding:2rem 0}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="kicker" id="kicker">Cadena de oración</div>
    <div class="lang" id="lang">
      <button data-l="es">ES</button>
      <button data-l="en">EN</button>
    </div>
  </div>
  <h1 id="title">Oración por la Paz</h1>
  <p class="lede" id="lede"></p>
  <div class="rule"></div>

  <div id="banner" class="banner" style="display:none"></div>
  <div id="confirm" class="confirm" style="display:none"></div>

  <div class="meta">
    <div class="week" id="week">—</div>
    <div class="cover" id="cover"></div>
  </div>

  <div class="tzrow">
    <label for="tz" id="tzlabel">Tu zona horaria</label>
    <select id="tz"></select>
    <span class="tznote" id="tznote"></span>
  </div>

  <div class="tabs" id="tabs"></div>
  <div id="board" class="state">Cargando…</div>

  <p class="note" id="note"></p>
</div>

<script>
/* ====== CONFIGURACIÓN ======
   Pegá acá la URL del despliegue de Apps Script (termina en /exec).
   Si lo dejás vacío, la página corre en MODO DEMO con datos de ejemplo. */
const CONFIG = {
  endpoint: "https://script.google.com/macros/s/AKfycbwrRe_AoI64ZEbtZksLLWYRpApeedhFEo3lOCIisywr3Ir-p5zvIEWw9FUYL6DBsBQY/exec"
};

/* TZ_REF: zona de referencia. Es el ANCLA del calendario: los 252 turnos y
   los días del tablero se definen en hora de Mendoza y son los mismos para
   todo el mundo (la cadena es una sola, en tiempo absoluto). Mendoza no tiene
   horario de verano → offset fijo -03:00. */
const TZ_REF = "America/Argentina/Mendoza";
const TZ_REF_OFFSET = "-03:00";
const TOTAL_FRANJAS = 252; // 7 días × 36

/* Zonas horarias para mostrar la hora LOCAL de cada turno. La selección no
   cambia el calendario, sólo la conversión que ve el usuario. La conversión
   parte del instante absoluto, así Europa con horario de verano sale bien. */
const TIMEZONES = [
  {g:"latam", id:"America/Argentina/Mendoza",     es:"Argentina (Mendoza)",        en:"Argentina (Mendoza)"},
  {g:"latam", id:"America/Argentina/Buenos_Aires",es:"Argentina (Buenos Aires)",   en:"Argentina (Buenos Aires)"},
  {g:"latam", id:"America/Santiago",              es:"Chile",                      en:"Chile"},
  {g:"latam", id:"America/Montevideo",            es:"Uruguay",                    en:"Uruguay"},
  {g:"latam", id:"America/Asuncion",              es:"Paraguay",                   en:"Paraguay"},
  {g:"latam", id:"America/La_Paz",                es:"Bolivia",                    en:"Bolivia"},
  {g:"latam", id:"America/Sao_Paulo",             es:"Brasil",                     en:"Brazil"},
  {g:"latam", id:"America/Lima",                  es:"Perú",                       en:"Peru"},
  {g:"latam", id:"America/Bogota",                es:"Colombia",                   en:"Colombia"},
  {g:"latam", id:"America/Guayaquil",             es:"Ecuador",                    en:"Ecuador"},
  {g:"latam", id:"America/Caracas",               es:"Venezuela",                  en:"Venezuela"},
  {g:"latam", id:"America/Mexico_City",           es:"México",                     en:"Mexico"},
  {g:"latam", id:"America/Guatemala",             es:"Guatemala / Centroamérica",  en:"Guatemala / Central America"},
  {g:"latam", id:"America/Santo_Domingo",         es:"Rep. Dominicana",            en:"Dominican Rep."},
  {g:"eu",    id:"Europe/Madrid",                 es:"España",                     en:"Spain"},
  {g:"eu",    id:"Europe/Lisbon",                 es:"Portugal",                   en:"Portugal"},
  {g:"eu",    id:"Europe/Rome",                   es:"Italia",                     en:"Italy"},
  {g:"eu",    id:"Europe/Paris",                  es:"Francia",                    en:"France"},
];
const TZ_IDS = new Set(TIMEZONES.map(z=>z.id));

/* Zona elegida para ver la hora local: lo guardado, o la del navegador si
   está en la lista, o la de referencia. */
let TZ_USER = localStorage.getItem("tz");
if(!TZ_IDS.has(TZ_USER)){
  let nav = "";
  try{ nav = Intl.DateTimeFormat().resolvedOptions().timeZone || ""; }catch(_){}
  TZ_USER = TZ_IDS.has(nav) ? nav : TZ_REF;
}

/* ====== TEXTOS (i18n) ====== */
const I18N = {
  es:{
    kicker:"Cadena de oración",
    title:"Oración por la Paz",
    lede:"Oración perpetua, 24 horas. Cada día se divide en 36 turnos de 40 minutos. Elegí uno o más turnos y cubrilos para que la oración nunca se corte. Pueden anotarse varias personas en el mismo turno.",
    dias:["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"],
    diasCorto:["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"],
    meses:["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"],
    semanaDel:"Semana del",
    al:"al",
    de:"de",
    cobertura:(n)=>`${n} de ${TOTAL_FRANJAS} turnos cubiertos`,
    cobDia:(n)=>`${n}/36`,
    nadie:"Sin cubrir — sumate",
    personas:(n)=>n===1?"1 persona":`${n} personas`,
    sumarme:"Sumarme a este turno",
    borrarme:"Borrarme",
    nombre:"Nombre",
    email:"Email",
    confirmar:"Confirmar",
    confirmarBaja:"Borrarme",
    cancelar:"cancelar",
    enviando:"Enviando…",
    cargando:"Cargando turnos…",
    errCargar:"No se pudieron cargar los turnos. Revisá la conexión.",
    errEnviar:"No se pudo registrar. Intentá de nuevo.",
    errBorrar:"No se pudo borrar. Intentá de nuevo.",
    bajaSinMatch:"No encontramos una inscripción con ese email en este turno.",
    demo:"Modo demo — configurá CONFIG.endpoint con tu URL de Apps Script para activar las inscripciones reales.",
    nota:"Los datos quedan registrados de forma privada. El email solo se usa para recordatorios y nunca aparece en este tablero público.",
    tzLabel:"Tu zona horaria",
    tzGrupos:{latam:"Latinoamérica", eu:"Europa"},
    refCiudad:"Mendoza (ref.)",
    tuHora:"tu hora",
    tzNota:"Los turnos están anclados a la hora de Mendoza (referencia común). Elegí tu zona para ver a qué hora local te toca.",
    confirmTexto:(f,h)=>`Listo, te sumaste al turno del ${f} a las ${h} (hora de Mendoza). Agregalo a tu calendario para no olvidarte.`,
    addCal:"Agregar a mi calendario",
    cerrar:"cerrar",
    evtTitulo:"Oración por la Paz — mi turno",
    evtDesc:"Turno de 40 minutos en la cadena de oración perpetua por la paz.",
    evtAlarma:"Tu turno de oración empieza pronto",
    htmlLang:"es"
  },
  en:{
    kicker:"Prayer chain",
    title:"Prayer for Peace",
    lede:"Perpetual prayer, 24 hours a day. Each day is split into 36 slots of 40 minutes. Choose one or more slots and cover them so prayer never stops. Several people can sign up for the same slot.",
    dias:["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
    diasCorto:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
    meses:["January","February","March","April","May","June","July","August","September","October","November","December"],
    semanaDel:"Week of",
    al:"to",
    de:"",
    cobertura:(n)=>`${n} of ${TOTAL_FRANJAS} slots covered`,
    cobDia:(n)=>`${n}/36`,
    nadie:"Uncovered — join in",
    personas:(n)=>n===1?"1 person":`${n} people`,
    sumarme:"Join this slot",
    borrarme:"Remove me",
    nombre:"Name",
    email:"Email",
    confirmar:"Confirm",
    confirmarBaja:"Remove me",
    cancelar:"cancel",
    enviando:"Sending…",
    cargando:"Loading slots…",
    errCargar:"Could not load the slots. Check your connection.",
    errEnviar:"Could not register. Please try again.",
    errBorrar:"Could not remove. Please try again.",
    bajaSinMatch:"No sign-up found with that email for this slot.",
    demo:"Demo mode — set CONFIG.endpoint to your Apps Script URL to enable real sign-ups.",
    nota:"Your details are stored privately. Email is only used for reminders and never shown on this public board.",
    tzLabel:"Your time zone",
    tzGrupos:{latam:"Latin America", eu:"Europe"},
    refCiudad:"Mendoza (ref.)",
    tuHora:"your time",
    tzNota:"Slots are anchored to Mendoza time (shared reference). Pick your zone to see your local time for each slot.",
    confirmTexto:(f,h)=>`Done — you joined the ${f} slot at ${h} (Mendoza time). Add it to your calendar so you don't forget.`,
    addCal:"Add to my calendar",
    cerrar:"close",
    evtTitulo:"Prayer for Peace — my slot",
    evtDesc:"40-minute slot in the perpetual prayer chain for peace.",
    evtAlarma:"Your prayer slot starts soon",
    htmlLang:"en"
  }
};

/* idioma inicial: lo guardado, o el del navegador, o español */
let LANG = localStorage.getItem("lang")
  || (navigator.language && navigator.language.toLowerCase().startsWith("en") ? "en" : "es");
let DIA_SEL = 0;            // índice de día seleccionado (0 = lunes)
let INSCRIPCIONES = [];     // [{fecha, franja, nombre}]

const t = () => I18N[LANG];

/* ---- fecha de hoy en zona horaria de Mendoza ---- */
function hoyEnTZ(){
  const f = new Intl.DateTimeFormat("en-CA",{timeZone:TZ_REF,year:"numeric",month:"2-digit",day:"2-digit"});
  const [y,m,d] = f.format(new Date()).split("-").map(Number);
  return new Date(Date.UTC(y,m-1,d,12,0,0)); // mediodía UTC para evitar desfases
}
function lunesDeLaSemana(){
  const x = hoyEnTZ();
  const dow = (x.getUTCDay()+6)%7; // 0 = lunes
  x.setUTCDate(x.getUTCDate()-dow);
  return x;
}
function claveFecha(d){ return d.toISOString().slice(0,10); }

function diasDeLaSemana(){
  const base = lunesDeLaSemana();
  return Array.from({length:7},(_,i)=>{
    const d = new Date(base); d.setUTCDate(base.getUTCDate()+i);
    return { key:claveFecha(d), num:d.getUTCDate(), mes:parseInt(d.toISOString().slice(5,7))-1 };
  });
}

/* ---- las 36 franjas de un día: "00:00","00:40",... "23:20" ---- */
function franjasDelDia(){
  return Array.from({length:36},(_,i)=>{
    const mins=i*40;
    return `${String(Math.floor(mins/60)).padStart(2,"0")}:${String(mins%60).padStart(2,"0")}`;
  });
}
function finFranja(inicio){
  const [h,m]=inicio.split(":").map(Number);
  let mt=(h*60+m+40)%1440;
  return `${String(Math.floor(mt/60)).padStart(2,"0")}:${String(mt%60).padStart(2,"0")}`;
}

/* ---- conversión de un turno a la hora local de TZ_USER ----
   Parte del instante absoluto (fecha+franja en Mendoza, offset fijo -03:00)
   y lo formatea en la zona elegida. Devuelve el rango "HH:mm–HH:mm" y, si en
   esa zona el turno cae en otro día, el nombre corto del día como prefijo. */
function partesEnTZ(inst, tz){
  const p = new Intl.DateTimeFormat("en-GB",{
    timeZone:tz, hourCycle:"h23",
    hour:"2-digit", minute:"2-digit",
    year:"numeric", month:"2-digit", day:"2-digit"
  }).formatToParts(inst);
  const g = type => (p.find(x=>x.type===type)||{}).value;
  return { hh:g("hour"), mm:g("minute"), key:`${g("year")}-${g("month")}-${g("day")}` };
}
function rangoLocal(fecha, franja, tz){
  const ini = new Date(`${fecha}T${franja}:00${TZ_REF_OFFSET}`);
  const fin = new Date(ini.getTime() + 40*60000);
  const s = partesEnTZ(ini, tz), e = partesEnTZ(fin, tz);
  let pref = "";
  if(s.key !== fecha){
    const wd = new Date(s.key+"T12:00:00Z").getUTCDay(); // 0=domingo
    pref = t().diasCorto[(wd+6)%7] + " ";
  }
  return `${pref}${s.hh}:${s.mm}–${e.hh}:${e.mm}`;
}

function rangoTexto(dias){
  const T=t(), a=dias[0], b=dias[6];
  const ma=T.meses[a.mes], mb=T.meses[b.mes];
  if(LANG==="en"){
    return ma===mb ? `${ma} ${a.num}–${b.num}` : `${ma} ${a.num} ${T.al} ${mb} ${b.num}`;
  }
  return ma===mb ? `${a.num} ${T.al} ${b.num} ${T.de} ${ma}` : `${a.num} ${T.de} ${ma} ${T.al} ${b.num} ${T.de} ${mb}`;
}

/* ---- datos de ejemplo (modo demo) ---- */
function demoData(){
  const d = diasDeLaSemana();
  return [
    {fecha:d[0].key,franja:"00:00",nombre:"María L."},
    {fecha:d[0].key,franja:"00:00",nombre:"Diego R."},
    {fecha:d[0].key,franja:"06:00",nombre:"Ana M."},
    {fecha:d[1].key,franja:"21:20",nombre:"Lucía F."},
    {fecha:d[3].key,franja:"12:00",nombre:"Pedro G."},
    {fecha:d[6].key,franja:"23:20",nombre:"Clara V."},
  ];
}

async function cargar(){
  if(!CONFIG.endpoint){
    const b=document.getElementById("banner");
    b.style.display="block"; b.textContent=t().demo;
    INSCRIPCIONES = demoData();
    render(); return;
  }
  try{
    const r = await fetch(CONFIG.endpoint,{method:"GET"});
    const j = await r.json();
    INSCRIPCIONES = (j.inscripciones||[]);
    render();
  }catch(e){
    document.getElementById("board").className="state";
    document.getElementById("board").textContent = t().errCargar;
  }
}

/* ---- pinta los textos fijos según idioma ---- */
function pintarChrome(){
  const T=t();
  document.documentElement.lang = T.htmlLang;
  document.getElementById("kicker").textContent = T.kicker;
  document.getElementById("title").textContent = T.title;
  document.getElementById("lede").textContent = T.lede;
  document.getElementById("note").textContent = T.nota;
  document.title = T.title;
  document.querySelectorAll("#lang button").forEach(b=>{
    b.classList.toggle("active", b.dataset.l===LANG);
  });
  pintarTZ();
}

/* ---- selector de zona horaria: opciones agrupadas + textos i18n ---- */
function pintarTZ(){
  const T=t();
  document.getElementById("tzlabel").textContent = T.tzLabel;
  document.getElementById("tznote").textContent = T.tzNota;
  const sel = document.getElementById("tz");
  sel.innerHTML = "";
  ["latam","eu"].forEach(g=>{
    const og = document.createElement("optgroup");
    og.label = T.tzGrupos[g];
    TIMEZONES.filter(z=>z.g===g).forEach(z=>{
      const op = document.createElement("option");
      op.value = z.id;
      op.textContent = z[LANG];
      if(z.id===TZ_USER) op.selected = true;
      og.appendChild(op);
    });
    sel.appendChild(og);
  });
}

function render(){
  pintarChrome();
  const T=t();
  const dias = diasDeLaSemana();
  const clavesSemana = new Set(dias.map(d=>d.key));

  // contador global de cobertura (franjas con al menos 1 persona, en esta semana)
  const cubiertas = new Set(
    INSCRIPCIONES.filter(i=>clavesSemana.has(i.fecha)).map(i=>i.fecha+"|"+i.franja)
  );
  document.getElementById("week").textContent = `${T.semanaDel} ${rangoTexto(dias)}`;
  document.getElementById("cover").textContent = T.cobertura(cubiertas.size);

  // pestañas por día
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";
  dias.forEach((d,i)=>{
    const cubDia = new Set(
      INSCRIPCIONES.filter(x=>x.fecha===d.key).map(x=>x.franja)
    ).size;
    const btn = document.createElement("button");
    btn.className = "tab"+(i===DIA_SEL?" active":"");
    btn.innerHTML = `<span>${T.diasCorto[i]}</span><span class="tnum">${d.num}</span><span class="tcov">${T.cobDia(cubDia)}</span>`;
    btn.addEventListener("click",()=>{ DIA_SEL=i; render(); });
    tabs.appendChild(btn);
  });

  // franjas del día seleccionado
  const dia = dias[DIA_SEL];
  const board = document.getElementById("board");
  board.className = "slots";
  board.innerHTML = "";

  franjasDelDia().forEach(franja=>{
    const gente = INSCRIPCIONES.filter(i=>i.fecha===dia.key && i.franja===franja);
    const slot = document.createElement("div");
    slot.className = "slot"+(gente.length?" has":"");

    const personas = gente.length
      ? `<div class="people">${gente.map(g=>escapeHtml(g.nombre)).join(" · ")}</div>`
      : `<div class="people"><span class="empty">${T.nadie}</span></div>`;

    const mostrarLocal = TZ_USER !== TZ_REF;
    const localLine = mostrarLocal
      ? `<div class="local"><span class="lt">${T.tuHora}</span><span class="lh">${rangoLocal(dia.key,franja,TZ_USER)}</span></div>`
      : "";

    slot.innerHTML = `
      <div class="head">
        <span class="time">${franja}–${finFranja(franja)}</span>
        ${mostrarLocal?`<span class="ref">${T.refCiudad}</span>`:""}
        <span class="count">${gente.length?T.personas(gente.length):""}</span>
      </div>
      ${localLine}
      ${personas}
      <div class="actions">
        <button class="join">${T.sumarme}</button>
        ${gente.length?`<button class="leave">${T.borrarme}</button>`:""}
      </div>
      <form class="form alta" data-franja="${franja}">
        <div class="row"><label>${T.nombre}</label><input name="nombre" required maxlength="60" placeholder="${T.nombre}"></div>
        <div class="row"><label>${T.email}</label><input name="email" type="email" required placeholder="tu@correo.com"></div>
        <button type="submit">${T.confirmar}</button>
        <button type="button" class="cancel">${T.cancelar}</button>
      </form>
      ${gente.length?`<form class="form baja" data-franja="${franja}">
        <div class="row"><label>${T.email}</label><input name="email" type="email" required placeholder="tu@correo.com"></div>
        <button type="submit">${T.confirmarBaja}</button>
        <button type="button" class="cancel">${T.cancelar}</button>
      </form>`:""}`;

    const formAlta = slot.querySelector("form.alta");
    slot.querySelector(".join").addEventListener("click",()=>{
      const open = formAlta.classList.contains("open");
      document.querySelectorAll(".form.open").forEach(f=>f.classList.remove("open"));
      if(!open){ formAlta.classList.add("open"); formAlta.querySelector("input").focus(); }
    });
    formAlta.querySelector(".cancel").addEventListener("click",()=>formAlta.classList.remove("open"));
    formAlta.addEventListener("submit",ev=>enviar(ev,formAlta,dia.key));

    const formBaja = slot.querySelector("form.baja");
    if(formBaja){
      slot.querySelector(".leave").addEventListener("click",()=>{
        const open = formBaja.classList.contains("open");
        document.querySelectorAll(".form.open").forEach(f=>f.classList.remove("open"));
        if(!open){ formBaja.classList.add("open"); formBaja.querySelector("input").focus(); }
      });
      formBaja.querySelector(".cancel").addEventListener("click",()=>formBaja.classList.remove("open"));
      formBaja.addEventListener("submit",ev=>borrar(ev,formBaja,dia.key));
    }

    board.appendChild(slot);
  });
}

async function enviar(ev,form,fecha){
  ev.preventDefault();
  const btn = form.querySelector("button[type=submit]");
  const datos = {
    fecha,
    franja: form.dataset.franja,
    nombre: form.nombre.value.trim(),
    email: form.email.value.trim()
  };
  if(!datos.nombre || !datos.email) return;
  btn.disabled=true; btn.textContent=t().enviando;

  if(!CONFIG.endpoint){
    INSCRIPCIONES.push({fecha:datos.fecha,franja:datos.franja,nombre:datos.nombre});
    mostrarConfirm(datos.fecha, datos.franja);
    render(); return;
  }
  try{
    const params = new URLSearchParams();
    params.append("fecha", datos.fecha);
    params.append("franja", datos.franja);
    params.append("nombre", datos.nombre);
    params.append("email", datos.email);
    params.append("lang", LANG);
    await fetch(CONFIG.endpoint,{ method:"POST", body:params });
    INSCRIPCIONES.push({fecha:datos.fecha,franja:datos.franja,nombre:datos.nombre}); // optimista
    mostrarConfirm(datos.fecha, datos.franja);
    render();
  }catch(e){
    btn.disabled=false; btn.textContent=t().confirmar;
    alert(t().errEnviar);
  }
}

async function borrar(ev,form,fecha){
  ev.preventDefault();
  const btn = form.querySelector("button[type=submit]");
  const email = form.email.value.trim();
  if(!email) return;
  btn.disabled=true; btn.textContent=t().enviando;

  if(!CONFIG.endpoint){
    // demo: no hay emails en los datos de ejemplo, sólo cerramos el formulario
    form.classList.remove("open"); btn.disabled=false; btn.textContent=t().confirmarBaja; return;
  }
  try{
    const params = new URLSearchParams();
    params.append("accion","baja");
    params.append("fecha", fecha);
    params.append("franja", form.dataset.franja);
    params.append("email", email);
    const r = await fetch(CONFIG.endpoint,{ method:"POST", body:params });
    let j = null; try{ j = await r.json(); }catch(_){}
    if(j === null){ await cargar(); return; }          // no se pudo leer: refrescamos igual
    if(j.ok && j.borradas > 0){ await cargar(); return; } // baja efectiva: re-render desde el servidor
    btn.disabled=false; btn.textContent=t().confirmarBaja;
    alert(t().bajaSinMatch);
  }catch(e){
    btn.disabled=false; btn.textContent=t().confirmarBaja;
    alert(t().errBorrar);
  }
}

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

/* ====== Calendario del lado del cliente (.ics) ======
   Genera el .ics en el navegador, sin pasar por el mail: el recordatorio NO
   depende de la cuota de Gmail (~100/día). Evento puntual de 40 min anclado a
   la hora de Mendoza (offset fijo -03:00) + alarma 15 min antes. METHOD:PUBLISH
   para que el calendario lo agregue directo, sin RSVP. */
function construirICSCliente(fecha, franja){
  const T = t();
  const ini = new Date(`${fecha}T${franja}:00${TZ_REF_OFFSET}`);
  const fin = new Date(ini.getTime() + 40*60000);
  const pad = n => String(n).padStart(2,"0");
  const stamp = d => `${d.getUTCFullYear()}${pad(d.getUTCMonth()+1)}${pad(d.getUTCDate())}T${pad(d.getUTCHours())}${pad(d.getUTCMinutes())}${pad(d.getUTCSeconds())}Z`;
  const esc = s => String(s).replace(/([,;\\])/g,"\\$1").replace(/\n/g,"\\n");
  const uid = ((self.crypto && crypto.randomUUID) ? crypto.randomUUID()
              : Date.now()+"-"+Math.random().toString(16).slice(2)) + "@oracionporlapaz";
  return [
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Oracion por la Paz//ES","CALSCALE:GREGORIAN","METHOD:PUBLISH",
    "BEGIN:VEVENT",
    "UID:"+uid,
    "DTSTAMP:"+stamp(new Date()),
    "DTSTART:"+stamp(ini),
    "DTEND:"+stamp(fin),
    "SUMMARY:"+esc(T.evtTitulo),
    "DESCRIPTION:"+esc(T.evtDesc),
    "BEGIN:VALARM","TRIGGER:-PT15M","ACTION:DISPLAY","DESCRIPTION:"+esc(T.evtAlarma),"END:VALARM",
    "END:VEVENT","END:VCALENDAR"
  ].join("\r\n");
}
function descargarICS(fecha, franja){
  const blob = new Blob([construirICSCliente(fecha, franja)], {type:"text/calendar;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "turno-oracion.ics";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
/* Confirmación tras anotarse: mensaje + botón de calendario. Vive fuera del
   tablero, así sobrevive al render(). */
function mostrarConfirm(fecha, franja){
  const T = t();
  const c = document.getElementById("confirm");
  c.style.display = "flex";
  c.innerHTML = "";
  const msg = document.createElement("span");
  msg.className = "ctxt";
  msg.textContent = T.confirmTexto(fecha, franja);
  const add = document.createElement("button");
  add.className = "addcal";
  add.textContent = T.addCal;
  add.addEventListener("click", ()=>descargarICS(fecha, franja));
  const close = document.createElement("button");
  close.className = "cclose";
  close.textContent = T.cerrar;
  close.addEventListener("click", ()=>{ c.style.display="none"; });
  c.append(msg, add, close);
  c.scrollIntoView({behavior:"smooth", block:"nearest"});
}

/* ---- selector de idioma ---- */
document.getElementById("lang").addEventListener("click",e=>{
  const b = e.target.closest("button"); if(!b) return;
  LANG = b.dataset.l; localStorage.setItem("lang",LANG); render();
});

/* ---- selector de zona horaria ---- */
document.getElementById("tz").addEventListener("change",e=>{
  TZ_USER = e.target.value;
  localStorage.setItem("tz",TZ_USER);
  render();
});

/* arranque: día de hoy seleccionado por defecto */
DIA_SEL = (hoyEnTZ().getUTCDay()+6)%7;
cargar();
